server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────
    # Forward /api/* to the Node.js API service running on port 3001.
    # This works both when the API runs on the same host (VPS) and when it
    # is available via the host network in Docker (host.docker.internal).
    location /api/ {
        # host.docker.internal resolves to the Docker host IP.
        # On Linux VPS this is added via --add-host in 02_deploy_app.sh.
        proxy_pass         http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
